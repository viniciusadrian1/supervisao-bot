# Blueprint do Render — suba o repositório e o Render lê este arquivo.
# (Render Dashboard -> New -> Blueprint -> aponte para o repo)
services:
  - type: web
    name: supervisao-bot
    runtime: node
    plan: starter            # Starter (~US$7/mês): não hiberna, segura o webhook 24/7
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: data
      mountPath: /data       # disco persistente: estado das conversas + leads
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: PROVIDER
        value: uazapi
      - key: SITE_URL
        value: supervisao.com.br
      # Gerado automaticamente pelo Render — garante webhook seguro no 1º deploy
      # (em produção, WEBHOOK_SECRET vazio faz o app não subir, por design).
      - key: WEBHOOK_SECRET
        generateValue: true
      # Preencha estes no painel do Render (Environment) — sync:false = secretos:
      - key: PUBLIC_URL
        sync: false
      - key: UAZAPI_BASE_URL
        sync: false
      - key: UAZAPI_TOKEN
        sync: false
      - key: OWNER_NUMBER
        sync: false
      # Painel de visualização (opcional). Sem PANEL_PASSWORD ele fica desligado.
      - key: PANEL_USER
        sync: false
      - key: PANEL_PASSWORD
        sync: false
      # IA opcional (classificador). Sem OPENAI_API_KEY, o bot roda nas regras.
      - key: OPENAI_API_KEY
        sync: false
